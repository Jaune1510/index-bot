<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 400px;
    height: 400px;
    overflow: hidden;
  }

  #container {
    width: 400px;
    height: 400px;
    position: relative;
  }

  /* --- Cambiá los src de estas dos imágenes por tus PNGs --- */
  #img-silent, #img-talking {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: opacity 0.05s ease;
  }

  #img-talking {
    opacity: 0;
  }

  /* Estado hablando */
  body.talking #img-silent  { opacity: 0; }
  body.talking #img-talking { opacity: 1; }

  /* Debug UI - solo visible cuando NO está en OBS (se oculta con ?obs en la URL) */
  #debug {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 10;
  }

  #vol-wrap {
    width: 180px;
    height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 99px;
    overflow: hidden;
  }

  #vol-bar {
    height: 100%;
    width: 0%;
    background: #e07090;
    border-radius: 99px;
  }

  #mic-btn {
    padding: 6px 18px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: sans-serif;
  }

  #mic-btn:hover { background: rgba(80,40,60,0.7); }
  #mic-btn:disabled { opacity: 0.5; cursor: default; }

  #status {
    font-family: sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.4);
    padding: 3px 10px;
    border-radius: 99px;
  }

  /* Ocultar debug en modo OBS */
  body.obs-mode #debug { display: none; }
</style>
</head>
<body>

<div id="container">

  <!--
    REEMPLAZÁ ESTOS src POR TUS IMÁGENES:
    - zorra_callada.png  → imagen con la boca cerrada
    - zorra_hablando.png → imagen con la boca abierta
    Deben estar en la misma carpeta que este HTML.
  -->
  <img id="img-silent"  src="zorra_callada.png"  alt="callada"  onerror="this.style.display='none'; showFallback('silent')" />
  <img id="img-talking" src="zorra_hablando.png" alt="hablando" onerror="this.style.display='none'; showFallback('talking')" />

  <!-- Canvas de fallback cuando no hay imágenes -->
  <canvas id="fallback-silent"  width="400" height="400" style="position:absolute;top:0;left:0;display:none;"></canvas>
  <canvas id="fallback-talking" width="400" height="400" style="position:absolute;top:0;left:0;display:none;"></canvas>

  <div id="debug">
    <button id="mic-btn">🎤 Activar micrófono</button>
    <div id="vol-wrap"><div id="vol-bar"></div></div>
    <div id="status">Mic inactivo</div>
  </div>

</div>

<script>
// ── Configuración ──────────────────────────────────────────────
const CONFIG = {
  threshold:    20,    // volumen mínimo para considerar que estás hablando (0-100)
  holdMs:      120,    // ms que se mantiene "hablando" después de que baja el volumen
  obsMode:    false,   // true = oculta el debug UI (útil si usás ?obs en la URL)
};

// ── Modo OBS: agregá ?obs a la URL para ocultar el botón ───────
if (location.search.includes('obs')) {
  CONFIG.obsMode = true;
  document.body.classList.add('obs-mode');
  autoStartMic();   // en modo OBS arranca el mic automáticamente
}

// ── Estado ────────────────────────────────────────────────────
let isTalking = false;
let holdTimeout = null;

function setTalking(val) {
  if (val === isTalking) return;
  isTalking = val;
  document.body.classList.toggle('talking', val);
  document.getElementById('status').textContent = val ? '🗣 Hablando' : '🔇 Silencio';
}

// ── Audio ─────────────────────────────────────────────────────
async function startMic() {
  const btn = document.getElementById('mic-btn');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const audioCtx  = new AudioContext();
    const src       = audioCtx.createMediaStreamSource(stream);
    const analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    btn.textContent = '✅ Mic activo';
    btn.disabled = true;
    document.getElementById('status').textContent = '🔇 Silencio';

    function tick() {
      analyser.getByteFrequencyData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i];
      const avg = sum / data.length;

      const pct = Math.min(100, (avg / 80) * 100);
      document.getElementById('vol-bar').style.width = pct + '%';

      if (avg > CONFIG.threshold) {
        clearTimeout(holdTimeout);
        setTalking(true);
      } else if (isTalking) {
        clearTimeout(holdTimeout);
        holdTimeout = setTimeout(() => setTalking(false), CONFIG.holdMs);
      }
      requestAnimationFrame(tick);
    }
    tick();

  } catch(e) {
    btn.textContent = '❌ Permiso denegado';
    document.getElementById('status').textContent = 'Permiso de mic denegado';
    console.error(e);
  }
}

async function autoStartMic() {
  // En modo OBS reintenta hasta conseguir el mic
  try { await startMic(); }
  catch(e) { setTimeout(autoStartMic, 2000); }
}

document.getElementById('mic-btn').addEventListener('click', startMic);

// ── Fallback canvas (si no encuentra las imágenes PNG) ─────────
function showFallback(state) {
  const cvId  = state === 'silent' ? 'fallback-silent' : 'fallback-talking';
  const imgId = state === 'silent' ? 'img-silent' : 'img-talking';
  document.getElementById(cvId).style.display = 'block';
  drawPlaceholder(document.getElementById(cvId), state === 'talking');
  // reemplaza la img en las transiciones CSS
  document.getElementById(imgId).replaceWith(document.getElementById(cvId));
}

function drawPlaceholder(cv, talking) {
  const ctx = cv.getContext('2d');
  const W = 400, H = 400, cx = 200, cy = 200;
  ctx.clearRect(0,0,W,H);

  // orejas
  [[cx-55,cy-80,-0.15],[cx+55,cy-80,0.15]].forEach(([x,y,a]) => {
    ctx.save(); ctx.translate(x,y); ctx.rotate(a);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-22,-50); ctx.lineTo(22,-50); ctx.closePath();
    ctx.fillStyle='#e8855a'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(-12,-40); ctx.lineTo(12,-40); ctx.closePath();
    ctx.fillStyle='#f09090'; ctx.fill();
    ctx.restore();
  });

  // cabeza
  ctx.beginPath(); ctx.ellipse(cx,cy,88,96,0,0,Math.PI*2);
  ctx.fillStyle='#e8855a'; ctx.fill();

  // hocico
  ctx.beginPath(); ctx.ellipse(cx,cy+34,46,42,0,0,Math.PI*2);
  ctx.fillStyle='#f5c4a0'; ctx.fill();

  // ojos
  const eyeY = cy-18;
  [[cx-32,eyeY],[cx+32,eyeY]].forEach(([ex,ey]) => {
    ctx.beginPath(); ctx.ellipse(ex,ey,13,15,0,0,Math.PI*2);
    ctx.fillStyle='#2a1a2e'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(ex-4,ey-4,5,5,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.fill();
    if (talking) {
      ctx.beginPath(); ctx.ellipse(ex,ey,15,12,0,0,Math.PI*2);
      ctx.strokeStyle='rgba(212,83,126,0.5)'; ctx.lineWidth=2; ctx.stroke();
    }
  });

  // nariz
  ctx.beginPath(); ctx.ellipse(cx,cy+8,9,8,0,0,Math.PI*2);
  ctx.fillStyle='#c4623a'; ctx.fill();

  // boca
  const my = cy+30;
  if (!talking) {
    ctx.beginPath(); ctx.moveTo(cx-18,my);
    ctx.quadraticCurveTo(cx,my+10,cx+18,my);
    ctx.strokeStyle='#2a1a2e'; ctx.lineWidth=2.5; ctx.stroke();
  } else {
    ctx.beginPath(); ctx.ellipse(cx,my+10,20,14,0,0,Math.PI*2);
    ctx.fillStyle='#3a1520'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx,my+10,18,7,0,0,Math.PI);
    ctx.fillStyle='#e07090'; ctx.fill();
    // cachetes
    [cx-38,cx+38].forEach(bx => {
      ctx.beginPath(); ctx.arc(bx,cy+22,13,0,Math.PI*2);
      ctx.fillStyle='rgba(212,83,126,0.3)'; ctx.fill();
    });
  }
}
</script>
</body>
</html>
