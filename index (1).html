<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    width: 400px;
    height: 400px;
    overflow: hidden;
  }
  canvas { position: absolute; top: 0; left: 0; }
  #img-silent, #img-talking {
    position: absolute; top: 0; left: 0;
    width: 400px; height: 400px;
    object-fit: contain; display: none;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     PARA CAMBIAR A TUS IMÁGENES:
     1. Cambiá USE_IMAGES a true
     2. Poné los nombres o URLs de tus PNGs abajo
     ═══════════════════════════════════════════════════════════ -->
<script>
const USE_IMAGES  = false;
const IMG_SILENT  = 'callada.png';
const IMG_TALKING = 'hablando.png';
</script>
<!-- ═══════════════════════════════════════════════════════════ -->

<canvas id="cv" width="400" height="400"></canvas>
<img id="img-silent"  alt="" />
<img id="img-talking" alt="" />

<script>
// ── Ajustes ───────────────────────────────────────────────────
const THRESHOLD = 18;   // subilo si detecta ruido ambiente sin hablar
const HOLD_MS   = 200;  // ms que mantiene "hablando" tras bajar el volumen
// ─────────────────────────────────────────────────────────────

// Estado global, una sola fuente de verdad
let talking     = false;
let holdTimeout = null;

function setTalking(val) {
  talking = val;
}

// ── MODO IMÁGENES ─────────────────────────────────────────────
if (USE_IMAGES) {
  document.getElementById('cv').style.display = 'none';
  const imgS = document.getElementById('img-silent');
  const imgT = document.getElementById('img-talking');
  imgS.src = IMG_SILENT;
  imgT.src = IMG_TALKING;
  imgS.style.display = 'block';

  // Observa cambios en `talking` cada frame
  (function imgLoop() {
    imgS.style.display = talking ? 'none'  : 'block';
    imgT.style.display = talking ? 'block' : 'none';
    requestAnimationFrame(imgLoop);
  })();

// ── MODO CANVAS ───────────────────────────────────────────────
} else {
  const canvas = document.getElementById('cv');
  const ctx    = canvas.getContext('2d');
  const W = 400, H = 400, cx = 200, cy = 200;

  let blinkTimer = 0;
  let blinkOpen  = true;
  let mouthPhase = 0;

  function drawEar(x, y, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(-20, -46); ctx.lineTo(20, -46);
    ctx.closePath();
    ctx.fillStyle = '#e8855a'; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -6); ctx.lineTo(-11, -36); ctx.lineTo(11, -36);
    ctx.closePath();
    ctx.fillStyle = '#f09090'; ctx.fill();
    ctx.restore();
  }

  function drawFrame() {
    ctx.clearRect(0, 0, W, H);

    drawEar(cx - 52, cy - 76, -0.15);
    drawEar(cx + 52, cy - 76,  0.15);

    // cabeza
    ctx.beginPath();
    ctx.ellipse(cx, cy, 82, 90, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#e8855a'; ctx.fill();

    // hocico
    ctx.beginPath();
    ctx.ellipse(cx, cy + 32, 44, 40, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#f5c4a0'; ctx.fill();

    // ojos
    const eyeY = cy - 18;
    if (blinkOpen) {
      [[cx - 30, eyeY], [cx + 30, eyeY]].forEach(([ex, ey]) => {
        ctx.beginPath();
        ctx.ellipse(ex, ey, 13, 15, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#2a1a2e'; ctx.fill();
        ctx.beginPath();
        ctx.ellipse(ex - 4, ey - 4, 5, 5, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.82)'; ctx.fill();
        if (talking) {
          ctx.beginPath();
          ctx.ellipse(ex, ey, 15, 12, 0, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(212,83,126,0.45)';
          ctx.lineWidth = 2; ctx.stroke();
        }
      });
    } else {
      [[cx - 30, eyeY], [cx + 30, eyeY]].forEach(([ex, ey]) => {
        ctx.beginPath();
        ctx.moveTo(ex - 13, ey);
        ctx.quadraticCurveTo(ex, ey + 7, ex + 13, ey);
        ctx.strokeStyle = '#2a1a2e'; ctx.lineWidth = 2.5; ctx.stroke();
      });
    }

    // nariz
    ctx.beginPath();
    ctx.ellipse(cx, cy + 8, 9, 8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#c4623a'; ctx.fill();

    // boca
    const my = cy + 28;
    if (!talking) {
      ctx.beginPath();
      ctx.moveTo(cx - 16, my);
      ctx.quadraticCurveTo(cx, my + 9, cx + 16, my);
      ctx.strokeStyle = '#2a1a2e'; ctx.lineWidth = 2.5;
      ctx.lineJoin = 'round'; ctx.stroke();
    } else {
      const open = 9 + Math.sin(mouthPhase) * 5;
      ctx.beginPath();
      ctx.ellipse(cx, my + open / 2, 18, open, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#3a1520'; ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx, my + open / 2, 16, open * 0.5, 0, 0, Math.PI);
      ctx.fillStyle = '#e07090'; ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx, my + open / 2, 11, open * 0.22, 0, Math.PI, Math.PI * 2);
      ctx.fillStyle = '#f0c0c0'; ctx.fill();
      [cx - 40, cx + 40].forEach(bx => {
        ctx.beginPath();
        ctx.arc(bx, cy + 22, 14, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(212,83,126,0.28)'; ctx.fill();
      });
    }

    // cola
    const tx = cx + 72, ty = cy + 68;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.bezierCurveTo(tx + 44, ty - 22, tx + 64, ty - 64, tx + 22, ty - 86);
    ctx.bezierCurveTo(tx - 8,  ty - 108, tx - 32, ty - 74, tx + 8,  ty - 52);
    ctx.bezierCurveTo(tx + 32, ty - 32,  tx + 10, ty + 10, tx,      ty);
    ctx.fillStyle = '#e8855a'; ctx.fill();
    ctx.beginPath();
    ctx.ellipse(tx + 22, ty - 86, 17, 13, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff8f8'; ctx.fill();
  }

  // Loop de render — solo dibuja, no toca el audio
  (function renderLoop() {
    if (talking) mouthPhase += 0.22;

    blinkTimer++;
    const interval = talking ? 100 : 155;
    if (blinkTimer > interval) {
      blinkOpen = false;
      if (blinkTimer > interval + 5) { blinkOpen = true; blinkTimer = 0; }
    }

    drawFrame();
    requestAnimationFrame(renderLoop);
  })();
}

// ── AUDIO — loop separado con setInterval ─────────────────────
async function initMic() {
  try {
    const stream   = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const audioCtx = new AudioContext();
    const src      = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    // Corre cada 50ms — completamente separado del render loop
    setInterval(() => {
      analyser.getByteFrequencyData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i];
      const avg = sum / data.length;

      if (avg > THRESHOLD) {
        clearTimeout(holdTimeout);
        holdTimeout = null;
        setTalking(true);
      } else if (talking) {
        if (!holdTimeout) {
          holdTimeout = setTimeout(() => {
            setTalking(false);
            holdTimeout = null;
          }, HOLD_MS);
        }
      }
    }, 50);

  } catch (e) {
    console.warn('Mic no disponible, reintentando...', e);
    setTimeout(initMic, 3000);
  }
}

initMic();
</script>
</body>
</html>
